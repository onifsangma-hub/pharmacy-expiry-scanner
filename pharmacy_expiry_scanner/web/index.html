<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Pharmacy Expiry Date Scanner - Track medicine batches and expiry dates">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rx Scanner">

  <!-- PWA / Mobile -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D7377">

  <!-- Camera permissions hint -->
  <meta http-equiv="Permissions-Policy" content="camera=*, microphone=()">

  <title>Pharmacy Expiry Scanner</title>
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <script src="https://unpkg.com/@zxing/library@0.19.1" type="application/javascript"></script>

  <!-- Apple splash screens (optional but improves PWA feel on iOS) -->

  <style>
    body {
      background-color: #0D7377;
      margin: 0;
      overflow: hidden;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0D7377;
      z-index: 9999;
    }

    #loading .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    #loading h1 {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 8px;
    }

    #loading p {
      color: rgba(255,255,255,0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      margin: 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen shown before Flutter initializes -->
  <div id="loading">
    <div class="logo">💊</div>
    <h1>Pharmacy Scanner</h1>
    <p>Loading your pharmacy...</p>
    <div class="spinner"></div>
  </div>

  <script>
    // Camera permission request on load for iOS Safari
    async function requestCameraPermission() {
      try {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          // Don't auto-request — Flutter will request when scanner opens
        }
      } catch (e) {
        console.log('Camera permission check:', e);
      }
    }
    requestCameraPermission();
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.5s ease';
        setTimeout(() => loading.remove(), 500);
      }
    });
  </script>
</body>
</html>
