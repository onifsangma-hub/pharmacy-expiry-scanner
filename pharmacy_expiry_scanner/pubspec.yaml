name: pharmacy_expiry_scanner
description: Pharmacy Expiry Date Scanner PWA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  
  # Barcode scanning (browser camera based)
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1

  # UI & Utils
  intl: ^0.18.1
  uuid: ^4.2.2
  go_router: ^12.1.3
  provider: ^6.1.1
  fl_chart: ^0.66.2
  printing: ^5.12.0
  pdf: ^3.10.7
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
